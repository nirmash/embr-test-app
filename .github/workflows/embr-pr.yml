name: Embr PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Embr config
        id: config
        run: |
          echo "project_id=$(jq -r .projectId .embr.json)" >> "$GITHUB_OUTPUT"
          echo "env_name=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Install Embr CLI
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          echo "@coreai-microsoft:registry=https://npm.pkg.github.com" >> ~/.npmrc
          npm install -g @coreai-microsoft/embr-cli
          echo "✅ Embr CLI $(embr --version)"

      - name: Authenticate
        run: embr auth login --token "${{ secrets.EMBR_TOKEN }}"

      - name: Create PR preview environment
        run: |
          embr environments create \
            -p ${{ steps.config.outputs.project_id }} \
            -n "${{ steps.config.outputs.env_name }}" \
            -b "${{ github.head_ref }}" \
            --json || true
          echo "✅ Preview environment '${{ steps.config.outputs.env_name }}' ready"

      - name: Comment PR with preview info
        if: github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const envName = '${{ steps.config.outputs.env_name }}';
            const branch = '${{ github.head_ref }}';
            const body = [
              `🚀 **Embr Preview Environment**`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Environment** | \`${envName}\` |`,
              `| **Branch** | \`${branch}\` |`,
              ``,
              `Embr auto-deploy will build and deploy this branch automatically.`,
              `The environment will be cleaned up when this PR is closed.`
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Embr config
        id: config
        run: |
          echo "project_id=$(jq -r .projectId .embr.json)" >> "$GITHUB_OUTPUT"
          echo "env_name=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Install Embr CLI
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          echo "@coreai-microsoft:registry=https://npm.pkg.github.com" >> ~/.npmrc
          npm install -g @coreai-microsoft/embr-cli
          echo "✅ Embr CLI $(embr --version)"

      - name: Authenticate
        run: embr auth login --token "${{ secrets.EMBR_TOKEN }}"

      - name: Find and delete PR environment
        run: |
          ENV_NAME="${{ steps.config.outputs.env_name }}"
          PROJECT_ID="${{ steps.config.outputs.project_id }}"

          # Look up environment ID by name
          ENV_ID=$(embr environments list -p "$PROJECT_ID" --json | \
            jq -r --arg name "$ENV_NAME" '.items[] | select(.name == $name) | .id')

          if [ -n "$ENV_ID" ] && [ "$ENV_ID" != "null" ]; then
            embr environments delete -p "$PROJECT_ID" -e "$ENV_ID" -f
            echo "✅ Deleted environment '$ENV_NAME' ($ENV_ID)"
          else
            echo "ℹ️ Environment '$ENV_NAME' not found — may have been deleted already"
          fi
